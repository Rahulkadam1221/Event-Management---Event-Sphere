<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>EventSphere — Premium Event Management Platform</title>
    <meta name="title" content="EventSphere — Premium Event Management Platform" />
    <meta name="description" content="Discover, create, and manage premium experiences. EventSphere is the smart choice for modern organizers seeking seamless ticketing, real-time analytics, and chat." />
    <meta name="keywords" content="events, ticketing, organizer, attendee, conference, concert, workshop, real-time chat, dashboard" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#6366f1" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://eventsphere.vercel.app/" />
    <meta property="og:title" content="EventSphere — Premium Event Management Platform" />
    <meta property="og:description" content="Discover, create, and manage premium experiences with seamless ticketing and real-time chat rooms." />
    <meta property="og:image" content="https://eventsphere.vercel.app/og-image.jpg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://eventsphere.vercel.app/" />
    <meta property="twitter:title" content="EventSphere — Premium Event Management Platform" />
    <meta property="twitter:description" content="Discover, create, and manage premium experiences with seamless ticketing and real-time chat rooms." />
    <meta property="twitter:image" content="https://eventsphere.vercel.app/og-image.jpg" />

    <!-- Apple Support -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Preconnect Fonts for Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- Structured Data JSON-LD for SEO -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "EventSphere",
        "url": "https://eventsphere.vercel.app",
        "description": "Smart, secure event management platform offering real-time analytics, instant ticketing, and interactive attendee chat.",
        "applicationCategory": "BusinessApplication",
        "operatingSystem": "All"
      }
    </script>
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <!-- Google Identity Services (GIS) client script for Google Login -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
